<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-labelledby="t"><title id="t">A skateboard and a compass with a reward gem</title>
<defs><linearGradient id="g" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#34c77b"/><stop offset="1" stop-color="#1f9d5c"/></linearGradient></defs>
<rect x="20" y="20" width="760" height="460" rx="40" fill="#eef1ff"/>

<!-- ground shadow band -->
<rect x="90" y="360" width="420" height="20" rx="10" fill="#cfc7f7"/>

<!-- skateboard -->
<g transform="translate(300 330) rotate(-8)">
  <!-- deck -->
  <rect x="-150" y="-14" width="300" height="28" rx="14" fill="#4F46C7"/>
  <rect x="-150" y="-14" width="300" height="10" rx="5" fill="#8f88e6"/>
  <!-- grip stripe -->
  <rect x="-120" y="-4" width="240" height="6" rx="3" fill="#cfc7f7"/>
  <!-- trucks -->
  <rect x="-108" y="14" width="10" height="20" rx="3" fill="#c98a3f"/>
  <rect x="98" y="14" width="10" height="20" rx="3" fill="#c98a3f"/>
  <!-- wheels -->
  <circle cx="-100" cy="40" r="18" fill="#f2c879"/>
  <circle cx="-100" cy="40" r="7" fill="#4F46C7"/>
  <circle cx="100" cy="40" r="18" fill="#f2c879"/>
  <circle cx="100" cy="40" r="7" fill="#4F46C7"/>
</g>

<!-- compass -->
<g transform="translate(540 210)">
  <circle cx="0" cy="0" r="96" fill="#8f88e6"/>
  <circle cx="0" cy="0" r="82" fill="#eef1ff"/>
  <circle cx="0" cy="0" r="82" fill="none" stroke="#cfc7f7" stroke-width="6"/>
  <!-- tick marks -->
  <rect x="-3" y="-78" width="6" height="16" rx="3" fill="#4F46C7"/>
  <rect x="-3" y="62" width="6" height="16" rx="3" fill="#4F46C7"/>
  <rect x="-78" y="-3" width="16" height="6" rx="3" fill="#4F46C7"/>
  <rect x="62" y="-3" width="16" height="6" rx="3" fill="#4F46C7"/>
  <!-- needle -->
  <polygon points="0,-56 16,0 0,10 -16,0" fill="#34c77b"/>
  <polygon points="0,56 16,0 0,-10 -16,0" fill="#5dcaa5"/>
  <circle cx="0" cy="0" r="10" fill="#4F46C7"/>
  <circle cx="0" cy="0" r="4" fill="#cfc7f7"/>
</g>

<!-- reward gem -->
<g transform="translate(650 360) scale(0.4)"><polygon points="-70,-44 70,-44 110,0 0,120 -110,0" fill="url(#g)"/><polygon points="-70,-44 70,-44 0,8" fill="#5be29a"/></g>

<!-- sparkles -->
<path d="M340 120 l7 16 16 7 -16 7 -7 16 -7 -16 -16 -7 16 -7 Z" fill="#f2c879"/>
<path d="M150 320 l5 11 11 5 -11 5 -5 11 -5 -11 -11 -5 11 -5 Z" fill="#4f46c7"/>
</svg>
