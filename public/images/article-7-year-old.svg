<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-labelledby="t"><title id="t">A magnifying glass and a kite with a reward gem</title>
  <defs><linearGradient id="g" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#34c77b"/><stop offset="1" stop-color="#1f9d5c"/></linearGradient></defs>
  <rect x="20" y="20" width="760" height="460" rx="40" fill="#eef1ff"/>

  <!-- ground -->
  <rect x="20" y="400" width="760" height="80" rx="0" fill="#5dcaa5"/>
  <rect x="20" y="400" width="760" height="20" fill="#34c77b"/>

  <!-- kite in the sky -->
  <g transform="translate(560 150)">
    <path d="M0 -70 L55 0 L0 90 L-55 0 Z" fill="#8f88e6"/>
    <path d="M0 -70 L0 90 M-55 0 L55 0" stroke="#4F46C7" stroke-width="5"/>
    <path d="M0 90 C 20 120, -20 150, 5 180 C 25 205, -10 230, 15 255" fill="none" stroke="#4F46C7" stroke-width="4"/>
    <path d="M5 180 l -22 -8 l 20 -14 Z" fill="#f2c879"/>
    <path d="M15 255 l -22 -8 l 20 -14 Z" fill="#f2c879"/>
  </g>

  <!-- leaf on the ground -->
  <g transform="translate(240 350)">
    <path d="M0 0 C 60 -60, 150 -60, 170 0 C 150 60, 60 60, 0 0 Z" fill="#34c77b"/>
    <path d="M0 0 C 60 -20, 130 -20, 170 0" fill="none" stroke="#1f9d5c" stroke-width="4"/>
    <line x1="0" y1="0" x2="170" y2="0" stroke="#1f9d5c" stroke-width="4"/>
  </g>

  <!-- magnifying glass over the leaf -->
  <g transform="translate(300 330)">
    <circle cx="0" cy="0" r="90" fill="#cfc7f7" opacity="0.55"/>
    <circle cx="0" cy="0" r="90" fill="none" stroke="#4F46C7" stroke-width="14"/>
    <rect x="55" y="55" width="120" height="34" rx="17" transform="rotate(45 55 55)" fill="#c98a3f"/>
  </g>

  <!-- reward gem, bottom-right -->
  <g transform="translate(650 360) scale(0.4)"><polygon points="-70,-44 70,-44 110,0 0,120 -110,0" fill="url(#g)"/><polygon points="-70,-44 70,-44 0,8" fill="#5be29a"/></g>

  <!-- sparkles -->
  <path d="M340 120 l7 16 16 7 -16 7 -7 16 -7 -16 -16 -7 16 -7 Z" fill="#f2c879"/>
  <path d="M150 320 l5 11 11 5 -11 5 -5 11 -5 -11 -11 -5 11 -5 Z" fill="#4f46c7"/>
</svg>
