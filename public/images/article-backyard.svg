<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-labelledby="t"><title id="t">A sunny backyard with a ball, a tree, and a reward gem</title>
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#34c77b"/>
      <stop offset="1" stop-color="#1f9d5c"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect x="20" y="20" width="760" height="460" rx="40" fill="#eef1ff"/>

  <!-- Sun -->
  <circle cx="620" cy="130" r="52" fill="#f2c879"/>
  <circle cx="620" cy="130" r="70" fill="#f2c879" opacity="0.25"/>

  <!-- Grass mound -->
  <path d="M20 400 Q 400 300 780 400 L780 440 Q780 480 740 480 L60 480 Q20 480 20 440 Z" fill="url(#g)"/>
  <path d="M20 415 Q 400 330 780 415 L780 430 Q400 350 20 430 Z" fill="#5dcaa5" opacity="0.7"/>

  <!-- Tree trunk -->
  <rect x="200" y="250" width="30" height="150" rx="10" fill="#c98a3f"/>
  <!-- Tree foliage -->
  <circle cx="215" cy="220" r="70" fill="#34c77b"/>
  <circle cx="165" cy="250" r="48" fill="#5dcaa5"/>
  <circle cx="265" cy="250" r="48" fill="#5dcaa5"/>
  <circle cx="215" cy="255" r="55" fill="#34c77b"/>

  <!-- Ball -->
  <circle cx="430" cy="400" r="42" fill="#8f88e6"/>
  <path d="M388 400 a42 42 0 0 1 84 0 Z" fill="#cfc7f7"/>
  <circle cx="430" cy="400" r="42" fill="none" stroke="#4F46C7" stroke-width="4"/>
  <line x1="388" y1="400" x2="472" y2="400" stroke="#4F46C7" stroke-width="4"/>

  <!-- Reward gem near bottom-right -->
  <g transform="translate(650 360) scale(0.4)">
    <polygon points="-70,-44 70,-44 110,0 0,120 -110,0" fill="url(#g)"/>
    <polygon points="-70,-44 70,-44 0,8" fill="#5be29a"/>
  </g>

  <!-- Sparkle stars -->
  <path d="M340 120 l7 16 16 7 -16 7 -7 16 -7 -16 -16 -7 16 -7 Z" fill="#f2c879"/>
  <path d="M150 320 l5 11 11 5 -11 5 -5 11 -5 -11 -11 -5 11 -5 Z" fill="#4f46c7"/>
</svg>
