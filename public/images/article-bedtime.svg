<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-labelledby="tbed">
  <title id="tbed">A crescent moon, an open book, and a reward gem in a night scene</title>
  <defs><linearGradient id="bedGem" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#34c77b"/><stop offset="1" stop-color="#1f9d5c"/></linearGradient></defs>
  <rect x="20" y="20" width="760" height="460" rx="40" fill="#eef1ff"/>

  <!-- crescent moon -->
  <g transform="translate(205 150)"><circle cx="0" cy="0" r="64" fill="#cfc7f7"/><circle cx="26" cy="-14" r="58" fill="#eef1ff"/></g>

  <!-- open book -->
  <g transform="translate(440 330)">
    <path d="M-130 -40 C-80 -60 -30 -55 0 -38 L0 92 C-30 74 -80 70 -130 88 Z" fill="#ffffff"/>
    <path d="M130 -40 C80 -60 30 -55 0 -38 L0 92 C30 74 80 70 130 88 Z" fill="#f3f1fb"/>
    <path d="M-130 -40 C-80 -60 -30 -55 0 -38 L0 -22 C-30 -39 -80 -44 -130 -24 Z" fill="#4f46c7"/>
    <path d="M130 -40 C80 -60 30 -55 0 -38 L0 -22 C30 -39 80 -44 130 -24 Z" fill="#3a32a0"/>
    <g stroke="#cfc7f7" stroke-width="5" stroke-linecap="round">
      <line x1="-104" y1="-16" x2="-24" y2="-6"/><line x1="-104" y1="10" x2="-24" y2="20"/><line x1="-104" y1="36" x2="-24" y2="46"/>
      <line x1="24" y1="-6" x2="104" y2="-16"/><line x1="24" y1="20" x2="104" y2="10"/><line x1="24" y1="46" x2="104" y2="36"/>
    </g>
  </g>

  <!-- gem -->
  <g transform="translate(668 200) scale(0.38)"><polygon points="-70,-44 70,-44 110,0 0,120 -110,0" fill="url(#bedGem)"/><polygon points="-70,-44 70,-44 0,8" fill="#5be29a"/></g>

  <!-- stars -->
  <path d="M360 120 l7 16 16 7 -16 7 -7 16 -7 -16 -16 -7 16 -7 Z" fill="#f2c879"/>
  <path d="M300 200 l5 11 11 5 -11 5 -5 11 -5 -11 -11 -5 11 -5 Z" fill="#4f46c7"/>
  <path d="M120 300 l5 11 11 5 -11 5 -5 11 -5 -11 -11 -5 11 -5 Z" fill="#34c77b"/>
</svg>
