<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-labelledby="t"><title id="t">A cardboard box fort with a reward gem</title>
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#34c77b"/>
      <stop offset="1" stop-color="#1f9d5c"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect x="20" y="20" width="760" height="460" rx="40" fill="#eef1ff"/>

  <!-- Clouds -->
  <g fill="#cfc7f7">
    <circle cx="170" cy="150" r="22"/>
    <circle cx="200" cy="150" r="28"/>
    <circle cx="232" cy="152" r="20"/>
    <circle cx="590" cy="120" r="20"/>
    <circle cx="620" cy="118" r="26"/>
    <circle cx="650" cy="120" r="18"/>
  </g>

  <!-- Ground -->
  <ellipse cx="400" cy="475" rx="370" ry="60" fill="#5dcaa5"/>

  <!-- Rocket fins -->
  <path d="M300 320 L258 402 L300 380 Z" fill="#34c77b"/>
  <path d="M420 320 L462 402 L420 380 Z" fill="#34c77b"/>

  <!-- Flames -->
  <path d="M322 380 L360 464 L398 380 Z" fill="#f2c879"/>
  <path d="M342 380 L360 432 L378 380 Z" fill="#34c77b"/>

  <!-- Cardboard body -->
  <rect x="300" y="182" width="120" height="200" rx="12" fill="#c98a3f"/>
  <!-- Cardboard seam -->
  <rect x="352" y="182" width="16" height="200" fill="#f2c879"/>
  <!-- Nose cone -->
  <path d="M300 182 L420 182 L360 108 Z" fill="#f2c879"/>
  <!-- Flap lines -->
  <line x1="300" y1="300" x2="420" y2="300" stroke="#4f46c7" stroke-width="4"/>
  <line x1="300" y1="340" x2="420" y2="340" stroke="#4f46c7" stroke-width="4"/>
  <!-- Porthole window -->
  <circle cx="360" cy="242" r="32" fill="#cfc7f7" stroke="#4f46c7" stroke-width="8"/>
  <circle cx="360" cy="242" r="15" fill="#8f88e6"/>

  <!-- Sparkle stars -->
  <path d="M340 120 l7 16 16 7 -16 7 -7 16 -7 -16 -16 -7 16 -7 Z" fill="#f2c879"/>
  <path d="M150 320 l5 11 11 5 -11 5 -5 11 -5 -11 -11 -5 11 -5 Z" fill="#4f46c7"/>

  <!-- Reward gem -->
  <g transform="translate(650 360) scale(0.4)">
    <polygon points="-70,-44 70,-44 110,0 0,120 -110,0" fill="url(#g)"/>
    <polygon points="-70,-44 70,-44 0,8" fill="#5be29a"/>
  </g>
</svg>
