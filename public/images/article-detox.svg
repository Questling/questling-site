<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-labelledby="tdet">
  <title id="tdet">A powered-down phone with a small green sprout and a reward gem</title>
  <defs><linearGradient id="detGem" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#34c77b"/><stop offset="1" stop-color="#1f9d5c"/></linearGradient></defs>
  <rect x="20" y="20" width="760" height="460" rx="40" fill="#eef1ff"/>

  <!-- sun with rays -->
  <g stroke="#f2c879" stroke-width="8" stroke-linecap="round">
    <line x1="618" y1="80" x2="618" y2="106"/><line x1="618" y1="214" x2="618" y2="240"/>
    <line x1="530" y1="160" x2="556" y2="160"/><line x1="680" y1="160" x2="706" y2="160"/>
    <line x1="556" y1="98" x2="574" y2="116"/><line x1="662" y1="204" x2="680" y2="222"/>
  </g>
  <circle cx="618" cy="160" r="48" fill="#f7d99a"/><circle cx="618" cy="160" r="32" fill="#f2c879"/>

  <!-- phone (powered off) -->
  <g transform="translate(300 300) rotate(-8)">
    <rect x="-72" y="-124" width="144" height="248" rx="26" fill="#3a3550"/>
    <rect x="-56" y="-108" width="112" height="216" rx="12" fill="#20203a"/>
    <circle cx="0" cy="72" r="11" fill="none" stroke="#6b63d6" stroke-width="4"/>
    <line x1="0" y1="60" x2="0" y2="76" stroke="#6b63d6" stroke-width="4" stroke-linecap="round"/>
  </g>

  <!-- sprout -->
  <g transform="translate(500 390)">
    <line x1="0" y1="16" x2="0" y2="-44" stroke="#2f9e6b" stroke-width="7" stroke-linecap="round"/>
    <path d="M0 -18 C0 -46 -30 -56 -48 -50 C-42 -24 -14 -18 0 -24 Z" fill="#5dcaa5"/>
    <path d="M0 -30 C0 -62 30 -74 50 -68 C44 -40 14 -34 0 -38 Z" fill="#34c77b"/>
  </g>

  <!-- gem -->
  <g transform="translate(662 370) scale(0.38)"><polygon points="-70,-44 70,-44 110,0 0,120 -110,0" fill="url(#detGem)"/><polygon points="-70,-44 70,-44 0,8" fill="#5be29a"/></g>

  <!-- sparkles -->
  <path d="M170 140 l7 16 16 7 -16 7 -7 16 -7 -16 -16 -7 16 -7 Z" fill="#f2c879"/>
  <path d="M470 180 l5 11 11 5 -11 5 -5 11 -5 -11 -11 -5 11 -5 Z" fill="#4f46c7"/>
</svg>
