<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-labelledby="td">
  <title id="td">A tablet resting on a table while a paper plane and a reward gem float nearby, suggesting trading screen time for play</title>
  <defs>
    <linearGradient id="dGem" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#34c77b"/>
      <stop offset="1" stop-color="#1f9d5c"/>
    </linearGradient>
    <radialGradient id="dGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#34c77b" stop-opacity="0.4"/>
      <stop offset="1" stop-color="#34c77b" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect x="20" y="20" width="760" height="460" rx="40" fill="#f0eefb"/>

  <!-- table surface -->
  <rect x="60" y="380" width="680" height="80" rx="20" fill="#e3dfff"/>

  <!-- sun -->
  <circle cx="640" cy="130" r="44" fill="#cfc7f7"/>

  <!-- reward gem with glow -->
  <circle cx="610" cy="250" r="110" fill="url(#dGlow)"/>
  <g transform="translate(610 250) scale(0.5)">
    <polygon points="-70,-44 70,-44 110,0 0,120 -110,0" fill="url(#dGem)"/>
    <polygon points="-70,-44 70,-44 0,8" fill="#5be29a"/>
  </g>

  <!-- tablet resting on the table, screen asleep -->
  <g transform="rotate(-6 300 300)">
    <rect x="200" y="170" width="200" height="240" rx="22" fill="#20203a"/>
    <rect x="214" y="190" width="172" height="200" rx="10" fill="#2c2c48"/>
    <!-- little crescent = screen 'asleep' -->
    <path d="M312 250 a34 34 0 1 0 0 68 a26 26 0 0 1 0 -68 Z" fill="#5b5b80"/>
    <circle cx="300" cy="400" r="7" fill="#3a3a5c"/>
  </g>

  <!-- paper plane flying off to play -->
  <g transform="translate(470 200) rotate(-18)">
    <polygon points="0,0 90,28 50,34 44,64" fill="#4f46c7"/>
    <polygon points="0,0 50,34 44,64" fill="#3a32a0"/>
    <path d="M-40 70 q40 -20 80 -34" fill="none" stroke="#cfc7f7" stroke-width="4" stroke-linecap="round" stroke-dasharray="2 12"/>
  </g>

  <!-- a ball on the table -->
  <circle cx="690" cy="392" r="26" fill="#34c77b"/>
  <path d="M666 388 a26 26 0 0 1 48 0" fill="none" stroke="#1f9d5c" stroke-width="3"/>

  <!-- sparkles -->
  <path d="M150 130 l7 16 16 7 -16 7 -7 16 -7 -16 -16 -7 16 -7 Z" fill="#57c8e6"/>
  <path d="M520 320 l6 13 13 6 -13 6 -6 13 -6 -13 -13 -6 13 -6 Z" fill="#34c77b"/>
</svg>
