<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-labelledby="t"><title id="t">A magnifying glass over a leaf with a reward gem</title>
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#34c77b"/>
      <stop offset="1" stop-color="#1f9d5c"/>
    </linearGradient>
  </defs>

  <rect x="20" y="20" width="760" height="460" rx="40" fill="#eef1ff"/>

  <!-- decorative background dots -->
  <circle cx="620" cy="110" r="16" fill="#cfc7f7"/>
  <circle cx="690" cy="160" r="9" fill="#8f88e6"/>
  <circle cx="110" cy="140" r="12" fill="#cfc7f7"/>

  <!-- leaf -->
  <path d="M250 250 Q340 150 430 250 Q340 350 250 250 Z" fill="#34c77b"/>
  <path d="M262 250 Q340 254 420 250" fill="none" stroke="#1f9d5c" stroke-width="5" stroke-linecap="round"/>
  <path d="M320 230 Q345 235 360 210" fill="none" stroke="#5dcaa5" stroke-width="4" stroke-linecap="round"/>
  <path d="M320 270 Q345 265 360 290" fill="none" stroke="#5dcaa5" stroke-width="4" stroke-linecap="round"/>

  <!-- little bug on the leaf -->
  <circle cx="368" cy="222" r="15" fill="#f2c879"/>
  <circle cx="356" cy="212" r="7" fill="#c98a3f"/>
  <circle cx="372" cy="220" r="3" fill="#c98a3f"/>
  <circle cx="366" cy="230" r="3" fill="#c98a3f"/>

  <!-- magnifying glass handle -->
  <line x1="268" y1="322" x2="205" y2="390" stroke="#c98a3f" stroke-width="26" stroke-linecap="round"/>

  <!-- lens -->
  <circle cx="340" cy="250" r="105" fill="#8f88e6" fill-opacity="0.22"/>
  <circle cx="340" cy="250" r="105" fill="none" stroke="#4F46C7" stroke-width="16"/>
  <ellipse cx="298" cy="208" rx="26" ry="15" fill="#cfc7f7" transform="rotate(-38 298 208)"/>

  <!-- sparkles -->
  <path d="M340 120 l7 16 16 7 -16 7 -7 16 -7 -16 -16 -7 16 -7 Z" fill="#f2c879"/>
  <path d="M150 320 l5 11 11 5 -11 5 -5 11 -5 -11 -11 -5 11 -5 Z" fill="#4f46c7"/>

  <!-- reward gem -->
  <g transform="translate(650 360) scale(0.4)">
    <polygon points="-70,-44 70,-44 110,0 0,120 -110,0" fill="url(#g)"/>
    <polygon points="-70,-44 70,-44 0,8" fill="#5be29a"/>
  </g>
</svg>
