<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-labelledby="tfam">
  <title id="tfam">A cozy evening scene with a crescent moon, a game board, dice, and a reward gem</title>
  <defs>
    <linearGradient id="famGem" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#34c77b"/><stop offset="1" stop-color="#1f9d5c"/>
    </linearGradient>
  </defs>
  <rect x="20" y="20" width="760" height="460" rx="40" fill="#eef1ff"/>

  <!-- crescent moon -->
  <g transform="translate(185 135)">
    <circle cx="0" cy="0" r="66" fill="#cfc7f7"/>
    <circle cx="26" cy="-14" r="60" fill="#eef1ff"/>
  </g>

  <!-- board game -->
  <g transform="rotate(-8 470 360)">
    <rect x="330" y="250" width="280" height="220" rx="20" fill="#4f46c7"/>
    <rect x="352" y="272" width="236" height="176" rx="10" fill="#6b63d6"/>
    <g stroke="#8f88e6" stroke-width="6">
      <line x1="352" y1="330" x2="588" y2="330"/>
      <line x1="352" y1="390" x2="588" y2="390"/>
      <line x1="411" y1="272" x2="411" y2="448"/>
      <line x1="470" y1="272" x2="470" y2="448"/>
      <line x1="529" y1="272" x2="529" y2="448"/>
    </g>
    <circle cx="382" cy="301" r="16" fill="#f2c879"/>
    <circle cx="499" cy="419" r="16" fill="#34c77b"/>
  </g>

  <!-- dice -->
  <g transform="rotate(12 661 381)">
    <rect x="626" y="346" width="70" height="70" rx="14" fill="#ffffff"/>
    <circle cx="648" cy="368" r="7" fill="#20203a"/>
    <circle cx="661" cy="381" r="7" fill="#20203a"/>
    <circle cx="674" cy="394" r="7" fill="#20203a"/>
  </g>

  <!-- gem -->
  <g transform="translate(155 385) scale(0.4)">
    <polygon points="-70,-44 70,-44 110,0 0,120 -110,0" fill="url(#famGem)"/>
    <polygon points="-70,-44 70,-44 0,8" fill="#5be29a"/>
  </g>

  <!-- stars -->
  <path d="M560 115 l7 16 16 7 -16 7 -7 16 -7 -16 -16 -7 16 -7 Z" fill="#f2c879"/>
  <path d="M665 180 l5 11 11 5 -11 5 -5 11 -5 -11 -11 -5 11 -5 Z" fill="#4f46c7"/>
  <path d="M430 150 l5 11 11 5 -11 5 -5 11 -5 -11 -11 -5 11 -5 Z" fill="#34c77b"/>
</svg>
