<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-labelledby="tgif">
  <title id="tgif">A wrapped present with a bow and a reward gem</title>
  <defs><linearGradient id="gifGem" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#34c77b"/><stop offset="1" stop-color="#1f9d5c"/></linearGradient></defs>
  <rect x="20" y="20" width="760" height="460" rx="40" fill="#eef1ff"/>

  <!-- present -->
