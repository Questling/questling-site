    <rect x="-120" y="-60" width="240" height="160" rx="14" fill="#4f46c7"/>
    <rect x="-18" y="-60" width="36" height="160" fill="#f2c879"/>
    <rect x="-120" y="0" width="240" height="32" fill="#f2c879"/>
    <path d="M0 -60 C-44 -104 -86 -96 -74 -68 C-52 -52 -20 -58 0 -60 Z" fill="#f7d99a"/>
