  <g transform="translate(600 360) scale(0.32)"><path d="M0 96 C-92 30 -140 -14 -140 -66 C-140 -108 -96 -128 -52 -102 C-26 -86 0 -54 0 -40 C0 -54 26 -86 52 -102 C96 -128 140 -108 140 -66 C140 -14 92 30 0 96 Z" fill="#5dcaa5"/></g>

