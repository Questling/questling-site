<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-labelledby="thol">
  <title id="thol">A small decorated tree with a star and a reward gem</title>
  <defs><linearGradient id="holGem" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#34c77b"/><stop offset="1" stop-color="#1f9d5c"/></linearGradient></defs>
  <rect x="20" y="20" width="760" height="460" rx="40" fill="#eef1ff"/>

  <!-- tree -->
  <g transform="translate(360 290)">
    <rect x="-18" y="118" width="36" height="36" rx="4" fill="#c98a3f"/>
    <polygon points="0,-24 76,64 -76,64" fill="#34c77b"/>
    <polygon points="0,-74 60,14 -60,14" fill="#5dcaa5"/>
    <polygon points="0,-118 46,-28 -46,-28" fill="#34c77b"/>
    <path d="M0 -166 l9 20 20 9 -20 9 -9 20 -9 -20 -20 -9 20 -9 Z" fill="#f2c879"/>
    <circle cx="-26" cy="34" r="9" fill="#f2c879"/>
    <circle cx="22" cy="4" r="9" fill="#8f88e6"/>
    <circle cx="4" cy="50" r="9" fill="#4f46c7"/>
    <circle cx="-16" cy="-14" r="8" fill="#5be29a"/>
  </g>

  <!-- gem -->
  <g transform="translate(640 370) scale(0.4)"><polygon points="-70,-44 70,-44 110,0 0,120 -110,0" fill="url(#holGem)"/><polygon points="-70,-44 70,-44 0,8" fill="#5be29a"/></g>

  <!-- sparkles -->
  <path d="M600 150 l7 16 16 7 -16 7 -7 16 -7 -16 -16 -7 16 -7 Z" fill="#f2c879"/>
  <path d="M150 200 l5 11 11 5 -11 5 -5 11 -5 -11 -11 -5 11 -5 Z" fill="#4f46c7"/>
  <path d="M170 360 l5 11 11 5 -11 5 -5 11 -5 -11 -11 -5 11 -5 Z" fill="#34c77b"/>
</svg>
