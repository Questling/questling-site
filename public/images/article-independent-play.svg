<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-labelledby="ti">
  <title id="ti">A child happily stacking building blocks on their own</title>
  <defs>
    <linearGradient id="iGem" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#34c77b"/><stop offset="1" stop-color="#1f9d5c"/>
    </linearGradient>
  </defs>
  <rect x="20" y="20" width="760" height="460" rx="40" fill="#f0eefb"/>
  <rect x="60" y="392" width="680" height="70" rx="20" fill="#e3dfff"/>

  <!-- child kneeling, playing -->
  <g>
    <circle cx="250" cy="228" r="44" fill="#4f46c7"/>
    <path d="M206 300 q44 -40 92 -6 l4 96 h-108 Z" fill="#4f46c7"/>
    <rect x="292" y="300" width="70" height="26" rx="13" fill="#ffd9b8" transform="rotate(18 292 300)"/>
  </g>

  <!-- block tower they're building -->
  <g>
    <rect x="430" y="330" width="66" height="60" rx="8" fill="#7f77dd"/>
    <rect x="438" y="272" width="50" height="58" rx="8" fill="#34c77b"/>
    <rect x="446" y="222" width="36" height="50" rx="7" fill="#f2c879"/>
    <!-- a block mid-air being placed -->
    <rect x="520" y="180" width="40" height="40" rx="7" fill="#e24b4a" transform="rotate(-12 540 200)"/>
  </g>

  <g transform="translate(650 340) scale(0.4)">
    <polygon points="-70,-44 70,-44 110,0 0,120 -110,0" fill="url(#iGem)"/>
    <polygon points="-70,-44 70,-44 0,8" fill="#5be29a"/>
  </g>
  <path d="M330 140 l7 16 16 7 -16 7 -7 16 -7 -16 -16 -7 16 -7 Z" fill="#57c8e6"/>
  <path d="M600 150 l5 11 11 5 -11 5 -5 11 -5 -11 -11 -5 11 -5 Z" fill="#34c77b"/>
</svg>
