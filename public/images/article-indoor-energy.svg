<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-labelledby="t"><title id="t">A cushion obstacle course with a reward gem</title>
  <defs><linearGradient id="g" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#34c77b"/><stop offset="1" stop-color="#1f9d5c"/></linearGradient></defs>

  <rect x="20" y="20" width="760" height="460" rx="40" fill="#eef1ff"/>

  <!-- floor shadows -->
  <ellipse cx="150" cy="452" rx="90" ry="14" fill="#cfc7f7"/>
  <ellipse cx="330" cy="452" rx="110" ry="16" fill="#cfc7f7"/>
  <ellipse cx="505" cy="452" rx="90" ry="14" fill="#cfc7f7"/>

  <!-- left cushion -->
  <rect x="70" y="398" width="150" height="54" rx="20" fill="#8f88e6"/>
  <circle cx="145" cy="425" r="8" fill="#cfc7f7"/>

  <!-- center cushion tower (the jump) -->
  <rect x="255" y="368" width="150" height="82" rx="22" fill="#5dcaa5"/>
  <rect x="272" y="336" width="116" height="46" rx="18" fill="#34c77b"/>
  <circle cx="330" cy="359" r="8" fill="#cfc7f7"/>

  <!-- right cushion -->
  <rect x="430" y="396" width="150" height="56" rx="20" fill="#f2c879"/>
  <circle cx="505" cy="424" r="8" fill="#cfc7f7"/>

  <!-- jumping child above the center tower -->
  <g stroke-linecap="round" fill="none">
    <!-- legs -->
    <path d="M330 258 L305 300" stroke="#8f88e6" stroke-width="18"/>
    <path d="M330 258 L358 292" stroke="#8f88e6" stroke-width="18"/>
    <!-- torso -->
    <path d="M330 205 L330 262" stroke="#4F46C7" stroke-width="30"/>
    <!-- arms up -->
    <path d="M330 216 L292 176" stroke="#4F46C7" stroke-width="16"/>
    <path d="M330 216 L368 176" stroke="#4F46C7" stroke-width="16"/>
  </g>
  <!-- head -->
  <circle cx="330" cy="176" r="27" fill="#f2c879"/>
  <path d="M305 168 a27 27 0 0 1 50 0 q-25 -14 -50 0 Z" fill="#c98a3f"/>

  <!-- sparkle stars -->
  <path d="M340 120 l7 16 16 7 -16 7 -7 16 -7 -16 -16 -7 16 -7 Z" fill="#f2c879"/>
  <path d="M150 320 l5 11 11 5 -11 5 -5 11 -5 -11 -11 -5 11 -5 Z" fill="#4f46c7"/>

  <!-- reward gem -->
  <g transform="translate(650 360) scale(0.4)"><polygon points="-70,-44 70,-44 110,0 0,120 -110,0" fill="url(#g)"/><polygon points="-70,-44 70,-44 0,8" fill="#5be29a"/></g>
</svg>
