<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-labelledby="tmorn">
  <title id="tmorn">A cheerful sunrise over a hill with a clock, a cereal bowl, and a reward gem</title>
  <defs>
    <linearGradient id="mornGem" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#34c77b"/><stop offset="1" stop-color="#1f9d5c"/>
    </linearGradient>
    <clipPath id="mornClip"><rect x="20" y="20" width="760" height="460" rx="40"/></clipPath>
  </defs>
  <rect x="20" y="20" width="760" height="460" rx="40" fill="#eef1ff"/>

  <g clip-path="url(#mornClip)">
    <!-- sun with rays -->
    <g stroke="#cfc7f7" stroke-width="8" stroke-linecap="round">
      <line x1="250" y1="120" x2="250" y2="150"/>
      <line x1="150" y1="220" x2="180" y2="220"/>
      <line x1="320" y1="220" x2="350" y2="220"/>
      <line x1="180" y1="150" x2="200" y2="170"/>
      <line x1="320" y1="150" x2="300" y2="170"/>
    </g>
    <circle cx="250" cy="240" r="60" fill="#f2c879"/>
    <circle cx="250" cy="240" r="44" fill="#f7d99a"/>

    <!-- hills -->
    <path d="M20 372 q180 -60 360 -10 t400 -6 V500 H20 Z" fill="#8fd0a6"/>
    <path d="M20 420 q220 -40 420 -6 t340 0 V500 H20 Z" fill="#5fb886"/>
  </g>

  <!-- clock -->
  <g transform="translate(565 185)">
    <circle cx="0" cy="0" r="64" fill="#ffffff"/>
    <circle cx="0" cy="0" r="64" fill="none" stroke="#4f46c7" stroke-width="10"/>
    <line x1="0" y1="0" x2="0" y2="-38" stroke="#20203a" stroke-width="8" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="28" y2="10" stroke="#20203a" stroke-width="8" stroke-linecap="round"/>
    <circle cx="0" cy="0" r="6" fill="#20203a"/>
  </g>

  <!-- cereal bowl -->
  <g transform="translate(470 405)">
    <path d="M-70 0 a70 40 0 0 0 140 0 Z" fill="#b9aef0"/>
    <ellipse cx="0" cy="0" rx="70" ry="22" fill="#8f88e6"/>
    <ellipse cx="0" cy="-2" rx="52" ry="14" fill="#cfc7f7"/>
  </g>

  <!-- gem -->
  <g transform="translate(665 385) scale(0.4)">
    <polygon points="-70,-44 70,-44 110,0 0,120 -110,0" fill="url(#mornGem)"/>
    <polygon points="-70,-44 70,-44 0,8" fill="#5be29a"/>
  </g>

  <!-- sparkles -->
  <path d="M430 120 l7 16 16 7 -16 7 -7 16 -7 -16 -16 -7 16 -7 Z" fill="#f2c879"/>
  <path d="M120 300 l5 11 11 5 -11 5 -5 11 -5 -11 -11 -5 11 -5 Z" fill="#4f46c7"/>
</svg>
