<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-labelledby="to">
  <title id="to">A sunny outdoor scene with a tree, a ball, a kite, and a reward gem</title>
  <defs>
    <linearGradient id="oGem" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#34c77b"/><stop offset="1" stop-color="#1f9d5c"/>
    </linearGradient>
  </defs>
  <rect x="20" y="20" width="760" height="460" rx="40" fill="#eaf3ff"/>
  <!-- sun -->
  <circle cx="150" cy="130" r="46" fill="#cfc7f7"/>
  <!-- grass -->
  <path d="M20 380 q200 -50 380 -20 t360 -10 V480 H20 Z" fill="#8fd0a6"/>
  <path d="M20 420 q220 -40 400 -12 t340 -6 V480 H20 Z" fill="#5fb886"/>
  <!-- tree -->
  <rect x="126" y="300" width="16" height="90" rx="7" fill="#6b5e4a"/>
  <circle cx="134" cy="278" r="46" fill="#2f8f57"/>
  <circle cx="98" cy="300" r="30" fill="#36a566"/>
  <circle cx="170" cy="300" r="32" fill="#36a566"/>
  <!-- kite -->
  <g transform="rotate(15 560 170)">
    <polygon points="560,120 600,170 560,240 520,170" fill="#4f46c7"/>
    <line x1="560" y1="120" x2="560" y2="240" stroke="#3a32a0" stroke-width="3"/>
    <line x1="520" y1="170" x2="600" y2="170" stroke="#3a32a0" stroke-width="3"/>
    <path d="M560 240 q10 25 -6 45 q16 12 4 40" fill="none" stroke="#cfc7f7" stroke-width="4"/>
    <path d="M548 258 l14 6 -6 14 M574 300 l14 6 -6 14" stroke="#34c77b" stroke-width="4" fill="none"/>
  </g>
  <!-- ball -->
  <circle cx="470" cy="392" r="30" fill="#e24b4a"/>
  <path d="M444 384 a30 30 0 0 1 52 0" fill="none" stroke="#a32d2d" stroke-width="3"/>
  <!-- gem -->
  <g transform="translate(670 360) scale(0.42)">
    <polygon points="-70,-44 70,-44 110,0 0,120 -110,0" fill="url(#oGem)"/>
    <polygon points="-70,-44 70,-44 0,8" fill="#5be29a"/>
  </g>
  <path d="M300 130 l7 16 16 7 -16 7 -7 16 -7 -16 -16 -7 16 -7 Z" fill="#f2c879"/>
</svg>
