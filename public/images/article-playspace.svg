<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-labelledby="tply">
  <title id="tply">A toy box with blocks and a ball and a reward gem</title>
  <defs><linearGradient id="plyGem" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#34c77b"/><stop offset="1" stop-color="#1f9d5c"/></linearGradient></defs>
  <rect x="20" y="20" width="760" height="460" rx="40" fill="#eef1ff"/>

  <!-- rug -->
  <ellipse cx="400" cy="412" rx="300" ry="42" fill="#e2ddf7"/>

  <!-- toy box -->
  <g transform="translate(300 320)">
    <rect x="-104" y="-30" width="208" height="120" rx="16" fill="#4f46c7"/>
    <rect x="-104" y="-30" width="208" height="34" rx="16" fill="#6b63d6"/>
    <rect x="-72" y="-78" width="48" height="48" rx="8" fill="#f2c879"/>
    <g transform="rotate(-8 6 -60)"><rect x="-18" y="-90" width="48" height="48" rx="8" fill="#5dcaa5"/></g>
    <rect x="36" y="-72" width="44" height="44" rx="8" fill="#8f88e6"/>
  </g>

  <!-- ball -->
  <circle cx="565" cy="360" r="48" fill="#5dcaa5"/>
  <path d="M517 360 q48 -40 96 0" fill="none" stroke="#eef1ff" stroke-width="7"/>
  <path d="M517 360 q48 40 96 0" fill="none" stroke="#eef1ff" stroke-width="7"/>
  <line x1="565" y1="312" x2="565" y2="408" stroke="#eef1ff" stroke-width="7"/>

  <!-- gem -->
  <g transform="translate(650 200) scale(0.38)"><polygon points="-70,-44 70,-44 110,0 0,120 -110,0" fill="url(#plyGem)"/><polygon points="-70,-44 70,-44 0,8" fill="#5be29a"/></g>

  <!-- sparkles -->
  <path d="M150 160 l7 16 16 7 -16 7 -7 16 -7 -16 -16 -7 16 -7 Z" fill="#f2c879"/>
  <path d="M430 150 l5 11 11 5 -11 5 -5 11 -5 -11 -11 -5 11 -5 Z" fill="#4f46c7"/>
</svg>
