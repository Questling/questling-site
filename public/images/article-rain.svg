<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-labelledby="tr">
  <title id="tr">A rainy window beside a blanket fort with a child peeking out, a reward gem floating above</title>
  <defs>
    <linearGradient id="rGem" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#34c77b"/>
      <stop offset="1" stop-color="#1f9d5c"/>
    </linearGradient>
  </defs>

  <rect x="20" y="20" width="760" height="460" rx="40" fill="#f0eefb"/>
  <rect x="60" y="392" width="680" height="70" rx="20" fill="#e3dfff"/>

  <!-- rainy window, left side -->
  <rect x="90" y="90" width="230" height="260" rx="18" fill="#cfc7f7"/>
  <rect x="106" y="106" width="198" height="228" rx="8" fill="#57c8e6" opacity="0.35"/>
  <line x1="205" y1="106" x2="205" y2="334" stroke="#cfc7f7" stroke-width="8"/>
  <line x1="106" y1="220" x2="304" y2="220" stroke="#cfc7f7" stroke-width="8"/>
  <!-- rain drops -->
  <g stroke="#4f46c7" stroke-width="4" stroke-linecap="round" opacity="0.5">
    <line x1="130" y1="130" x2="122" y2="160"/>
    <line x1="170" y1="150" x2="162" y2="180"/>
    <line x1="240" y1="130" x2="232" y2="160"/>
    <line x1="280" y1="160" x2="272" y2="190"/>
    <line x1="150" y1="250" x2="142" y2="280"/>
    <line x1="260" y1="260" x2="252" y2="290"/>
  </g>
  <!-- little cloud above the window -->
  <ellipse cx="205" cy="70" rx="60" ry="26" fill="#cfc7f7"/>

  <!-- blanket fort, right side -->
  <polygon points="430,360 620,360 560,180 490,180" fill="#4f46c7"/>
  <polygon points="490,180 560,180 525,150" fill="#3a32a0"/>
  <path d="M470 360 q55 -30 110 0" fill="none" stroke="#3a32a0" stroke-width="6" stroke-linecap="round"/>

  <!-- child peeking out of the fort opening -->
  <circle cx="525" cy="300" r="34" fill="#f3c9a1"/>
  <rect x="500" y="326" width="50" height="40" rx="16" fill="#57c8e6"/>

  <!-- reward gem floating above the fort -->
  <g transform="translate(620 140) scale(0.42)">
    <polygon points="-70,-44 70,-44 110,0 0,120 -110,0" fill="url(#rGem)"/>
    <polygon points="-70,-44 70,-44 0,8" fill="#5be29a"/>
  </g>

  <!-- sparkles -->
  <path d="M690 260 l6 13 13 6 -13 6 -6 13 -6 -13 -13 -6 13 -6 Z" fill="#34c77b"/>
  <path d="M360 250 l5 11 11 5 -11 5 -5 11 -5 -11 -11 -5 11 -5 Z" fill="#57c8e6"/>
</svg>
