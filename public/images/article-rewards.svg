<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-labelledby="tw">
  <title id="tw">A reward jar filling up with gems instead of candy or a screen</title>
  <defs>
    <linearGradient id="wGem" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#34c77b"/>
      <stop offset="1" stop-color="#1f9d5c"/>
    </linearGradient>
  </defs>

  <rect x="20" y="20" width="760" height="460" rx="40" fill="#f0eefb"/>
  <rect x="60" y="392" width="680" height="70" rx="20" fill="#e3dfff"/>

  <!-- jar -->
  <path d="M330 220 h140 q18 0 18 18 v170 q0 30 -30 30 h-116 q-30 0 -30 -30 v-170 q0 -18 18 -18 Z"
        fill="#ffffff" stroke="#cfc7f7" stroke-width="6"/>
  <!-- jar neck + lid -->
  <rect x="352" y="188" width="96" height="34" rx="10" fill="#ffffff" stroke="#cfc7f7" stroke-width="6"/>
  <rect x="340" y="170" width="120" height="24" rx="10" fill="#4f46c7"/>

  <!-- gems stacked inside the jar, small to large -->
  <g transform="translate(370 380) scale(0.34)">
    <polygon points="-70,-44 70,-44 110,0 0,120 -110,0" fill="url(#wGem)"/>
    <polygon points="-70,-44 70,-44 0,8" fill="#5be29a"/>
  </g>
  <g transform="translate(430 370) scale(0.3)">
    <polygon points="-70,-44 70,-44 110,0 0,120 -110,0" fill="url(#wGem)"/>
    <polygon points="-70,-44 70,-44 0,8" fill="#5be29a"/>
  </g>
  <g transform="translate(400 330) scale(0.32)">
    <polygon points="-70,-44 70,-44 110,0 0,120 -110,0" fill="url(#wGem)"/>
    <polygon points="-70,-44 70,-44 0,8" fill="#5be29a"/>
  </g>
  <g transform="translate(365 300) scale(0.26)">
    <polygon points="-70,-44 70,-44 110,0 0,120 -110,0" fill="url(#wGem)"/>
    <polygon points="-70,-44 70,-44 0,8" fill="#5be29a"/>
  </g>

  <!-- a gem falling into the jar from a hand above -->
  <g transform="translate(400 100) scale(0.4)">
    <polygon points="-70,-44 70,-44 110,0 0,120 -110,0" fill="url(#wGem)"/>
    <polygon points="-70,-44 70,-44 0,8" fill="#5be29a"/>
  </g>
  <path d="M400 130 v40" stroke="#cfc7f7" stroke-width="4" stroke-dasharray="2 10" stroke-linecap="round"/>

  <!-- crossed-out candy, left -->
  <g transform="translate(180 230)">
    <circle r="34" fill="#ffffff" stroke="#e6e3f5" stroke-width="4"/>
    <circle r="20" fill="#e88a9a"/>
    <rect x="-4" y="-30" width="8" height="18" fill="#cfc7f7"/>
    <rect x="-4" y="12" width="8" height="18" fill="#cfc7f7"/>
    <line x1="-24" y1="-24" x2="24" y2="24" stroke="#4f46c7" stroke-width="5" stroke-linecap="round"/>
  </g>

  <!-- crossed-out tablet, right -->
  <g transform="translate(620 230)">
    <circle r="34" fill="#ffffff" stroke="#e6e3f5" stroke-width="4"/>
    <rect x="-18" y="-24" width="36" height="48" rx="7" fill="#20203a"/>
    <line x1="-24" y1="-24" x2="24" y2="24" stroke="#4f46c7" stroke-width="5" stroke-linecap="round"/>
  </g>

  <!-- sparkles -->
  <path d="M250 380 l6 13 13 6 -13 6 -6 13 -6 -13 -13 -6 13 -6 Z" fill="#57c8e6"/>
  <path d="M560 350 l5 11 11 5 -11 5 -5 11 -5 -11 -11 -5 11 -5 Z" fill="#34c77b"/>
</svg>
