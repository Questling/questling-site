<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-labelledby="ts">
  <title id="ts">A balance scale weighing a tablet against a reward gem, roughly level</title>
  <defs>
    <linearGradient id="sGem" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#34c77b"/><stop offset="1" stop-color="#1f9d5c"/>
    </linearGradient>
  </defs>
  <rect x="20" y="20" width="760" height="460" rx="40" fill="#f0eefb"/>

  <!-- scale post + base -->
  <rect x="392" y="150" width="16" height="230" rx="8" fill="#4f46c7"/>
  <rect x="330" y="378" width="140" height="20" rx="10" fill="#4f46c7"/>
  <circle cx="400" cy="150" r="14" fill="#3a32a0"/>
  <!-- beam -->
  <rect x="210" y="164" width="380" height="14" rx="7" fill="#4f46c7" transform="rotate(-4 400 171)"/>

  <!-- left pan: tablet (screen) -->
  <g>
    <line x1="238" y1="150" x2="238" y2="250" stroke="#cfc7f7" stroke-width="3"/>
    <line x1="298" y1="158" x2="238" y2="250" stroke="#cfc7f7" stroke-width="3"/>
    <path d="M198 250 a40 40 0 0 0 80 0 Z" fill="#e3dfff"/>
    <rect x="222" y="206" width="32" height="44" rx="5" fill="#20203a"/>
    <circle cx="238" cy="243" r="2.5" fill="#5b5b80"/>
  </g>

  <!-- right pan: gem (real world) -->
  <g>
    <line x1="562" y1="158" x2="562" y2="238" stroke="#cfc7f7" stroke-width="3"/>
    <line x1="502" y1="150" x2="562" y2="238" stroke="#cfc7f7" stroke-width="3"/>
    <path d="M522 238 a40 40 0 0 0 80 0 Z" fill="#e3f5ec"/>
    <g transform="translate(562 214) scale(0.34)">
      <polygon points="-70,-44 70,-44 110,0 0,120 -110,0" fill="url(#sGem)"/>
      <polygon points="-70,-44 70,-44 0,8" fill="#5be29a"/>
    </g>
  </g>

  <path d="M400 90 l7 16 16 7 -16 7 -7 16 -7 -16 -16 -7 16 -7 Z" fill="#57c8e6"/>
  <path d="M690 120 l5 11 11 5 -11 5 -5 11 -5 -11 -11 -5 11 -5 Z" fill="#34c77b"/>
</svg>
