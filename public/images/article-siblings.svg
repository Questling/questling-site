<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-labelledby="tsib">
  <title id="tsib">Two kites in the sky with a reward gem</title>
  <defs><linearGradient id="sibGem" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#34c77b"/><stop offset="1" stop-color="#1f9d5c"/></linearGradient></defs>
  <rect x="20" y="20" width="760" height="460" rx="40" fill="#eef1ff"/>

  <!-- clouds -->
  <g fill="#dcd9f4"><ellipse cx="640" cy="130" rx="74" ry="32"/><ellipse cx="596" cy="120" rx="46" ry="30"/></g>

  <!-- kite 1 (indigo) -->
  <g transform="translate(255 205) rotate(-12)">
    <polygon points="0,-72 56,0 0,72 -56,0" fill="#4f46c7"/>
    <line x1="0" y1="-72" x2="0" y2="72" stroke="#3a32a0" stroke-width="3"/>
    <line x1="-56" y1="0" x2="56" y2="0" stroke="#3a32a0" stroke-width="3"/>
    <path d="M0 72 q20 26 -8 46 t12 42" fill="none" stroke="#8f88e6" stroke-width="4"/>
  </g>

  <!-- kite 2 (green) -->
  <g transform="translate(515 270) rotate(12)">
    <polygon points="0,-60 48,0 0,60 -48,0" fill="#34c77b"/>
    <line x1="0" y1="-60" x2="0" y2="60" stroke="#1f9d5c" stroke-width="3"/>
    <line x1="-48" y1="0" x2="48" y2="0" stroke="#1f9d5c" stroke-width="3"/>
    <path d="M0 60 q-18 24 8 42 t-10 38" fill="none" stroke="#5dcaa5" stroke-width="4"/>
  </g>

  <!-- gem -->
  <g transform="translate(400 400) scale(0.36)"><polygon points="-70,-44 70,-44 110,0 0,120 -110,0" fill="url(#sibGem)"/><polygon points="-70,-44 70,-44 0,8" fill="#5be29a"/></g>

  <!-- sparkles -->
  <path d="M150 340 l7 16 16 7 -16 7 -7 16 -7 -16 -16 -7 16 -7 Z" fill="#f2c879"/>
  <path d="M660 330 l5 11 11 5 -11 5 -5 11 -5 -11 -11 -5 11 -5 Z" fill="#4f46c7"/>
</svg>
