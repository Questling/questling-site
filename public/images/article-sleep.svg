<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-labelledby="tslp">
  <title id="tslp">A crescent moon with Z Z Z and a soft cloud beside a reward gem</title>
  <defs><linearGradient id="slpGem" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#34c77b"/><stop offset="1" stop-color="#1f9d5c"/></linearGradient></defs>
  <rect x="20" y="20" width="760" height="460" rx="40" fill="#eef1ff"/>

  <!-- cloud -->
  <g fill="#dcd9f4"><ellipse cx="280" cy="330" rx="150" ry="56"/><ellipse cx="210" cy="312" rx="70" ry="48"/><ellipse cx="360" cy="316" rx="80" ry="46"/></g>

  <!-- crescent moon -->
  <g transform="translate(250 180)"><circle cx="0" cy="0" r="70" fill="#cfc7f7"/><circle cx="28" cy="-16" r="62" fill="#eef1ff"/></g>

  <!-- Z Z Z ascending -->
  <g stroke="#8f88e6" stroke-width="8" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="440,318 466,318 440,344 466,344"/>
    <polyline points="486,268 520,268 486,304 520,304"/>
    <polyline points="548,204 592,204 548,250 592,250"/>
  </g>

  <!-- gem -->
  <g transform="translate(650 380) scale(0.38)"><polygon points="-70,-44 70,-44 110,0 0,120 -110,0" fill="url(#slpGem)"/><polygon points="-70,-44 70,-44 0,8" fill="#5be29a"/></g>

  <!-- sparkles -->
  <path d="M660 150 l7 16 16 7 -16 7 -7 16 -7 -16 -16 -7 16 -7 Z" fill="#f2c879"/>
  <path d="M140 410 l5 11 11 5 -11 5 -5 11 -5 -11 -11 -5 11 -5 Z" fill="#34c77b"/>
</svg>
