<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-labelledby="tsum">
  <title id="tsum">A bright summer scene with a sun, a popsicle, grass, and a reward gem</title>
  <defs>
    <linearGradient id="sumGem" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#34c77b"/><stop offset="1" stop-color="#1f9d5c"/>
    </linearGradient>
  </defs>
  <rect x="20" y="20" width="760" height="460" rx="40" fill="#eef1ff"/>

  <!-- big summer sun with rays -->
  <g stroke="#cfc7f7" stroke-width="8" stroke-linecap="round">
    <line x1="180" y1="40" x2="180" y2="70"/>
    <line x1="180" y1="230" x2="180" y2="260"/>
    <line x1="70" y1="150" x2="100" y2="150"/>
    <line x1="260" y1="150" x2="290" y2="150"/>
    <line x1="103" y1="73" x2="124" y2="94"/>
    <line x1="236" y1="207" x2="257" y2="228"/>
    <line x1="257" y1="73" x2="236" y2="94"/>
    <line x1="124" y1="207" x2="103" y2="228"/>
  </g>
  <circle cx="180" cy="150" r="60" fill="#cfc7f7"/>
  <circle cx="180" cy="150" r="42" fill="#b9aef0"/>

  <!-- grass -->
  <path d="M20 390 q200 -40 380 -16 t360 -8 V480 H20 Z" fill="#8fd0a6"/>
  <path d="M20 428 q220 -34 400 -10 t340 -4 V480 H20 Z" fill="#5fb886"/>

  <!-- popsicle -->
  <g transform="rotate(12 520 240)">
    <rect x="500" y="150" width="60" height="90" rx="26" fill="#5dcaa5"/>
    <rect x="500" y="150" width="60" height="30" rx="26" fill="#9fe1cb"/>
    <rect x="522" y="238" width="16" height="70" rx="8" fill="#d3b48c"/>
  </g>

  <!-- gem -->
  <g transform="translate(660 360) scale(0.42)">
    <polygon points="-70,-44 70,-44 110,0 0,120 -110,0" fill="url(#sumGem)"/>
    <polygon points="-70,-44 70,-44 0,8" fill="#5be29a"/>
  </g>
  <path d="M360 120 l7 16 16 7 -16 7 -7 16 -7 -16 -16 -7 16 -7 Z" fill="#f2c879"/>
  <path d="M640 150 l5 11 11 5 -11 5 -5 11 -5 -11 -11 -5 11 -5 Z" fill="#4f46c7"/>
</svg>
