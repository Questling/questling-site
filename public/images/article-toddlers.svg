<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-labelledby="ttod">
  <title id="ttod">A stack of colorful blocks, a ball, and a reward gem in a soft scene</title>
  <defs>
    <linearGradient id="todGem" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#34c77b"/><stop offset="1" stop-color="#1f9d5c"/>
    </linearGradient>
  </defs>
  <rect x="20" y="20" width="760" height="460" rx="40" fill="#eef1ff"/>

  <!-- soft floor -->
  <path d="M20 400 q380 -30 760 0 V480 H20 Z" fill="#e2ddf7"/>

  <!-- stacked blocks -->
  <rect x="150" y="330" width="110" height="90" rx="14" fill="#4f46c7"/>
  <rect x="165" y="248" width="90" height="82" rx="14" fill="#f2c879"/>
  <rect x="178" y="170" width="70" height="78" rx="14" fill="#34c77b"/>
  <circle cx="205" cy="375" r="20" fill="#6b63d6"/>
  <rect x="192" y="271" width="36" height="36" rx="8" fill="#f7d99a" transform="rotate(45 210 289)"/>

  <!-- ball -->
  <circle cx="470" cy="360" r="70" fill="#b9aef0"/>
  <path d="M400 360 q70 -55 140 0" fill="none" stroke="#eef1ff" stroke-width="10"/>
  <path d="M400 360 q70 55 140 0" fill="none" stroke="#eef1ff" stroke-width="10"/>
  <line x1="470" y1="290" x2="470" y2="430" stroke="#eef1ff" stroke-width="10"/>

  <!-- gem -->
  <g transform="translate(650 345) scale(0.42)">
    <polygon points="-70,-44 70,-44 110,0 0,120 -110,0" fill="url(#todGem)"/>
    <polygon points="-70,-44 70,-44 0,8" fill="#5be29a"/>
  </g>

  <!-- sparkles -->
  <path d="M360 130 l7 16 16 7 -16 7 -7 16 -7 -16 -16 -7 16 -7 Z" fill="#f2c879"/>
  <path d="M600 150 l5 11 11 5 -11 5 -5 11 -5 -11 -11 -5 11 -5 Z" fill="#4f46c7"/>
  <path d="M120 210 l5 11 11 5 -11 5 -5 11 -5 -11 -11 -5 11 -5 Z" fill="#34c77b"/>
</svg>
