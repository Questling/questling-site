<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-labelledby="tt">
  <title id="tt">A child calmly handing over a tablet in exchange for a reward gem</title>
  <defs>
    <linearGradient id="tGem" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#34c77b"/>
      <stop offset="1" stop-color="#1f9d5c"/>
    </linearGradient>
  </defs>

  <rect x="20" y="20" width="760" height="460" rx="40" fill="#f0eefb"/>
  <rect x="60" y="392" width="680" height="70" rx="20" fill="#e3dfff"/>

  <!-- child, left, holding out the tablet -->
  <g>
    <rect x="150" y="260" width="72" height="100" rx="30" fill="#4f46c7"/>
    <circle cx="186" cy="220" r="46" fill="#4f46c7"/>
    <rect x="215" y="270" width="90" height="24" rx="12" fill="#3a32a0" transform="rotate(6 215 270)"/>
  </g>

  <!-- tablet mid-handoff, fading -->
  <g transform="rotate(8 340 250)" opacity="0.85">
    <rect x="300" y="200" width="110" height="140" rx="16" fill="#20203a"/>
    <rect x="310" y="214" width="90" height="112" rx="8" fill="#2c2c48"/>
  </g>

  <!-- dashed arrow showing the trade -->
  <path d="M430 260 h140" fill="none" stroke="#cfc7f7" stroke-width="5" stroke-dasharray="3 14" stroke-linecap="round"/>
  <polygon points="570,252 592,260 570,268" fill="#cfc7f7"/>

  <!-- reward gem waiting on the right -->
  <g transform="translate(660 250) scale(0.55)">
    <polygon points="-70,-44 70,-44 110,0 0,120 -110,0" fill="url(#tGem)"/>
    <polygon points="-70,-44 70,-44 0,8" fill="#5be29a"/>
  </g>

  <!-- calm face detail: simple smile dot pair on the child -->
  <circle cx="172" cy="216" r="4" fill="#20203a"/>
  <circle cx="200" cy="216" r="4" fill="#20203a"/>

  <!-- sparkles -->
  <path d="M250 150 l6 13 13 6 -13 6 -6 13 -6 -13 -13 -6 13 -6 Z" fill="#57c8e6"/>
  <path d="M700 360 l5 11 11 5 -11 5 -5 11 -5 -11 -11 -5 11 -5 Z" fill="#34c77b"/>
</svg>
