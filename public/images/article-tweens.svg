<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-labelledby="ttween">
  <title id="ttween">A skateboard, a basketball, and a reward gem in a bright scene</title>
  <defs>
    <linearGradient id="tweenGem" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#34c77b"/><stop offset="1" stop-color="#1f9d5c"/>
    </linearGradient>
  </defs>
  <rect x="20" y="20" width="760" height="460" rx="40" fill="#eef1ff"/>

  <!-- soft ground -->
  <path d="M20 400 q380 -26 760 0 V480 H20 Z" fill="#e2ddf7"/>

  <!-- skateboard -->
  <g transform="rotate(-10 250 300)">
    <rect x="120" y="288" width="280" height="34" rx="17" fill="#4f46c7"/>
    <ellipse cx="152" cy="305" rx="16" ry="13" fill="#6b63d6"/>
    <ellipse cx="368" cy="305" rx="16" ry="13" fill="#6b63d6"/>
    <rect x="168" y="322" width="10" height="14" fill="#3a32a0"/>
    <rect x="342" y="322" width="10" height="14" fill="#3a32a0"/>
    <circle cx="173" cy="342" r="14" fill="#f2c879"/>
    <circle cx="347" cy="342" r="14" fill="#f2c879"/>
  </g>

  <!-- basketball -->
  <g transform="translate(565 300)">
    <circle cx="0" cy="0" r="76" fill="#e79a52"/>
    <circle cx="0" cy="0" r="76" fill="none" stroke="#c87d3a" stroke-width="4"/>
    <path d="M-76 0 H76 M0 -76 V76 M-54 -54 Q0 0 -54 54 M54 -54 Q0 0 54 54" fill="none" stroke="#a6632c" stroke-width="4"/>
  </g>

  <!-- gem -->
  <g transform="translate(165 185) scale(0.4)">
    <polygon points="-70,-44 70,-44 110,0 0,120 -110,0" fill="url(#tweenGem)"/>
    <polygon points="-70,-44 70,-44 0,8" fill="#5be29a"/>
  </g>

  <!-- sparkles -->
  <path d="M410 145 l7 16 16 7 -16 7 -7 16 -7 -16 -16 -7 16 -7 Z" fill="#f2c879"/>
  <path d="M675 175 l5 11 11 5 -11 5 -5 11 -5 -11 -11 -5 11 -5 Z" fill="#4f46c7"/>
  <path d="M300 205 l5 11 11 5 -11 5 -5 11 -5 -11 -11 -5 11 -5 Z" fill="#34c77b"/>
</svg>
