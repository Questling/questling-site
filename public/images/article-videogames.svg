<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-labelledby="tvg">
  <title id="tvg">A game controller beside a bright sun and a reward gem</title>
  <defs>
    <linearGradient id="vgGem" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#34c77b"/><stop offset="1" stop-color="#1f9d5c"/>
    </linearGradient>
  </defs>
  <rect x="20" y="20" width="760" height="460" rx="40" fill="#eef1ff"/>

  <!-- sun (the appealing outside) with rays -->
  <g stroke="#f2c879" stroke-width="9" stroke-linecap="round">
    <line x1="600" y1="92" x2="600" y2="120"/>
    <line x1="600" y1="250" x2="600" y2="278"/>
    <line x1="492" y1="185" x2="520" y2="185"/>
    <line x1="680" y1="185" x2="708" y2="185"/>
    <line x1="524" y1="109" x2="544" y2="129"/>
    <line x1="656" y1="241" x2="676" y2="261"/>
    <line x1="676" y1="109" x2="656" y2="129"/>
    <line x1="544" y1="241" x2="524" y2="261"/>
  </g>
  <circle cx="600" cy="185" r="58" fill="#f7d99a"/>
  <circle cx="600" cy="185" r="40" fill="#f2c879"/>

  <!-- game controller -->
  <g transform="translate(300 320)">
    <ellipse cx="-96" cy="30" rx="40" ry="52" fill="#4f46c7"/>
    <ellipse cx="96" cy="30" rx="40" ry="52" fill="#4f46c7"/>
    <rect x="-120" y="-30" width="240" height="80" rx="40" fill="#4f46c7"/>
    <rect x="-92" y="-8" width="14" height="44" rx="3" fill="#cfc7f7"/>
    <rect x="-107" y="7" width="44" height="14" rx="3" fill="#cfc7f7"/>
    <circle cx="72" cy="0" r="9" fill="#5be29a"/>
    <circle cx="96" cy="20" r="9" fill="#f2c879"/>
    <circle cx="48" cy="20" r="9" fill="#dcd9f4"/>
    <circle cx="72" cy="40" r="9" fill="#dcd9f4"/>
  </g>

  <!-- gem -->
  <g transform="translate(645 365) scale(0.4)">
    <polygon points="-70,-44 70,-44 110,0 0,120 -110,0" fill="url(#vgGem)"/>
    <polygon points="-70,-44 70,-44 0,8" fill="#5be29a"/>
  </g>

  <!-- sparkles -->
  <path d="M175 135 l7 16 16 7 -16 7 -7 16 -7 -16 -16 -7 16 -7 Z" fill="#f2c879"/>
  <path d="M150 300 l5 11 11 5 -11 5 -5 11 -5 -11 -11 -5 11 -5 Z" fill="#4f46c7"/>
  <path d="M470 345 l5 11 11 5 -11 5 -5 11 -5 -11 -11 -5 11 -5 Z" fill="#34c77b"/>
</svg>
