<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-labelledby="twork">
  <title id="twork">A laptop and a coffee mug beside a child's building blocks and a reward gem</title>
  <defs>
    <linearGradient id="workGem" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#34c77b"/><stop offset="1" stop-color="#1f9d5c"/>
    </linearGradient>
  </defs>
  <rect x="20" y="20" width="760" height="460" rx="40" fill="#eef1ff"/>

  <!-- laptop -->
  <rect x="250" y="150" width="240" height="150" rx="14" fill="#4f46c7"/>
  <rect x="266" y="166" width="208" height="118" rx="8" fill="#6b63d6"/>
  <rect x="230" y="300" width="280" height="18" rx="9" fill="#b9aef0"/>
  <rect x="286" y="194" width="120" height="10" rx="5" fill="#8f88e6"/>
  <rect x="286" y="216" width="88" height="10" rx="5" fill="#8f88e6"/>

  <!-- coffee mug -->
  <g transform="translate(600 250)">
    <rect x="-40" y="-30" width="80" height="72" rx="14" fill="#5dcaa5"/>
    <path d="M40 -16 h16 a18 18 0 0 1 0 36 H40" fill="none" stroke="#5dcaa5" stroke-width="10"/>
    <ellipse cx="0" cy="-30" rx="40" ry="12" fill="#9fe1cb"/>
  </g>

  <!-- kid's blocks -->
  <rect x="150" y="360" width="70" height="60" rx="10" fill="#f2c879"/>
  <rect x="164" y="304" width="56" height="56" rx="10" fill="#34c77b"/>
  <rect x="226" y="360" width="70" height="60" rx="10" fill="#4f46c7"/>

  <!-- gem -->
  <g transform="translate(640 370) scale(0.4)">
    <polygon points="-70,-44 70,-44 110,0 0,120 -110,0" fill="url(#workGem)"/>
    <polygon points="-70,-44 70,-44 0,8" fill="#5be29a"/>
  </g>

  <!-- sparkles -->
  <path d="M360 110 l7 16 16 7 -16 7 -7 16 -7 -16 -16 -7 16 -7 Z" fill="#f2c879"/>
  <path d="M560 150 l5 11 11 5 -11 5 -5 11 -5 -11 -11 -5 11 -5 Z" fill="#4f46c7"/>
  <path d="M120 250 l5 11 11 5 -11 5 -5 11 -5 -11 -11 -5 11 -5 Z" fill="#34c77b"/>
</svg>
