<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-labelledby="ko">
  <title id="ko">A happy child running outside in the sun</title>
  <defs>
    <linearGradient id="koGem" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#34c77b"/><stop offset="1" stop-color="#1f9d5c"/>
    </linearGradient>
  </defs>
  <rect x="20" y="20" width="760" height="460" rx="40" fill="#eaf3ff"/>
  <circle cx="650" cy="130" r="46" fill="#cfc7f7"/>

  <!-- grass -->
  <path d="M20 380 q200 -46 380 -18 t360 -8 V480 H20 Z" fill="#8fd0a6"/>
  <path d="M20 420 q220 -34 400 -10 t340 -4 V480 H20 Z" fill="#5fb886"/>

  <!-- tree -->
  <rect x="120" y="298" width="16" height="92" rx="7" fill="#6b5e4a"/>
  <circle cx="128" cy="276" r="46" fill="#2f8f57"/>
  <circle cx="92" cy="300" r="30" fill="#36a566"/>
  <circle cx="164" cy="300" r="32" fill="#36a566"/>

  <!-- running, happy kid -->
  <g transform="translate(400 300)">
    <!-- back arm up -->
    <rect x="-8" y="-70" width="20" height="58" rx="10" fill="#ffd9b8" transform="rotate(-35 2 -70)"/>
    <!-- body -->
    <rect x="-30" y="-62" width="60" height="92" rx="28" fill="#4f46c7"/>
    <!-- head -->
    <circle cx="0" cy="-92" r="40" fill="#ffd9b8"/>
    <path d="M-38 -100 q38 -40 76 0 q4 -26 -38 -26 q-42 0 -38 26 Z" fill="#3a32a0"/>
    <!-- front arm up -->
    <rect x="14" y="-72" width="20" height="58" rx="10" fill="#ffd9b8" transform="rotate(30 24 -72)"/>
    <!-- legs mid-stride -->
    <rect x="-26" y="24" width="22" height="70" rx="11" fill="#3a32a0" transform="rotate(18 -15 24)"/>
    <rect x="6" y="24" width="22" height="70" rx="11" fill="#3a32a0" transform="rotate(-24 17 24)"/>
  </g>

  <!-- gem + sparkles -->
  <g transform="translate(680 360) scale(0.4)">
    <polygon points="-70,-44 70,-44 110,0 0,120 -110,0" fill="url(#koGem)"/>
    <polygon points="-70,-44 70,-44 0,8" fill="#5be29a"/>
  </g>
  <path d="M540 120 l7 16 16 7 -16 7 -7 16 -7 -16 -16 -7 16 -7 Z" fill="#f2c879"/>
  <path d="M300 150 l5 11 11 5 -11 5 -5 11 -5 -11 -11 -5 11 -5 Z" fill="#34c77b"/>
</svg>
