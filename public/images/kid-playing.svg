<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-labelledby="kp">
  <title id="kp">A child kneeling outside, stacking blocks to build something</title>
  <defs>
    <linearGradient id="kpGem" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#34c77b"/><stop offset="1" stop-color="#1f9d5c"/>
    </linearGradient>
  </defs>
  <rect x="20" y="20" width="760" height="460" rx="40" fill="#eaf3ff"/>
  <circle cx="150" cy="120" r="42" fill="#cfc7f7"/>

  <!-- grass -->
  <path d="M20 384 q200 -40 380 -16 t360 -6 V480 H20 Z" fill="#8fd0a6"/>
  <path d="M20 422 q220 -30 400 -8 t340 -2 V480 H20 Z" fill="#5fb886"/>

  <!-- kneeling, building kid -->
  <g transform="translate(300 300)">
    <circle cx="0" cy="-70" r="40" fill="#ffd9b8"/>
    <path d="M-38 -78 q38 -40 76 0 q4 -26 -38 -26 q-42 0 -38 26 Z" fill="#3a32a0"/>
    <!-- crouched body -->
    <path d="M-34 -40 q34 -34 78 -6 l6 96 h-96 Z" fill="#4f46c7"/>
    <!-- reaching arm placing a block -->
    <rect x="34" y="-38" width="74" height="22" rx="11" fill="#ffd9b8" transform="rotate(14 34 -38)"/>
  </g>

  <!-- block tower being built -->
  <g>
    <rect x="452" y="330" width="70" height="60" rx="9" fill="#7f77dd"/>
    <rect x="460" y="272" width="54" height="58" rx="9" fill="#34c77b"/>
    <rect x="468" y="224" width="38" height="48" rx="8" fill="#f2c879"/>
    <rect x="410" y="352" width="130" height="20" rx="8" fill="#c0dd97"/>
    <!-- block mid-air (being placed) -->
    <rect x="404" y="192" width="42" height="40" rx="8" fill="#e24b4a" transform="rotate(-12 425 212)"/>
  </g>

  <!-- gem + sparkles -->
  <g transform="translate(670 350) scale(0.4)">
    <polygon points="-70,-44 70,-44 110,0 0,120 -110,0" fill="url(#kpGem)"/>
    <polygon points="-70,-44 70,-44 0,8" fill="#5be29a"/>
  </g>
  <path d="M600 130 l7 16 16 7 -16 7 -7 16 -7 -16 -16 -7 16 -7 Z" fill="#57c8e6"/>
  <path d="M250 150 l5 11 11 5 -11 5 -5 11 -5 -11 -11 -5 11 -5 Z" fill="#4f46c7"/>
</svg>
