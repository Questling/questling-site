<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-labelledby="tsca">
  <title id="tsca">A nature scavenger hunt checklist with a leaf, a rock, and a feather, and a reward gem</title>
  <defs>
    <linearGradient id="scaGem" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#34c77b"/><stop offset="1" stop-color="#1f9d5c"/>
    </linearGradient>
  </defs>
  <rect x="20" y="20" width="760" height="460" rx="40" fill="#f0eefb"/>
  <rect x="60" y="392" width="680" height="70" rx="20" fill="#e3dfff"/>

  <!-- clipboard -->
  <rect x="298" y="118" width="226" height="300" rx="18" fill="#4f46c7"/>
  <rect x="318" y="150" width="188" height="252" rx="10" fill="#ffffff"/>
  <rect x="360" y="110" width="104" height="26" rx="10" fill="#3a32a0"/>
  <rect x="394" y="102" width="36" height="20" rx="6" fill="#cbd0ec"/>

  <!-- checklist rows -->
  <rect x="338" y="176" width="24" height="24" rx="6" fill="#1f9d5c"/>
  <path d="M344 188 l5 5 8 -9" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="374" y="182" width="112" height="12" rx="6" fill="#d7d2f2"/>

  <rect x="338" y="220" width="24" height="24" rx="6" fill="#1f9d5c"/>
  <path d="M344 232 l5 5 8 -9" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="374" y="226" width="96" height="12" rx="6" fill="#d7d2f2"/>

  <rect x="338" y="264" width="24" height="24" rx="6" fill="#1f9d5c"/>
  <path d="M344 276 l5 5 8 -9" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="374" y="270" width="106" height="12" rx="6" fill="#d7d2f2"/>

  <rect x="338" y="308" width="24" height="24" rx="6" fill="#fff" stroke="#cfc7f7" stroke-width="4"/>
  <rect x="374" y="314" width="90" height="12" rx="6" fill="#e3dfff"/>

  <rect x="338" y="352" width="24" height="24" rx="6" fill="#fff" stroke="#cfc7f7" stroke-width="4"/>
  <rect x="374" y="358" width="102" height="12" rx="6" fill="#e3dfff"/>

  <!-- leaf -->
  <g transform="translate(150 400)">
    <path d="M0 42 q30 -66 96 -34 q-30 66 -96 34 Z" fill="#5fb886"/>
    <path d="M12 38 q40 -22 80 -22" fill="none" stroke="#2f8f57" stroke-width="4" stroke-linecap="round"/>
  </g>
  <!-- rock -->
  <path d="M230 452 q6 -36 48 -30 q42 4 34 30 Z" fill="#cbd0ec"/>
  <path d="M246 438 q16 -8 34 -5" fill="none" stroke="#aeb4dd" stroke-width="4" stroke-linecap="round"/>
  <!-- feather -->
  <g transform="translate(602 352) rotate(16)">
    <path d="M0 100 q-22 -46 6 -100 q26 48 8 96 Z" fill="#6a61e0"/>
    <line x1="4" y1="96" x2="8" y2="-2" stroke="#3a32a0" stroke-width="4" stroke-linecap="round"/>
    <g stroke="#8f88ef" stroke-width="3" stroke-linecap="round">
      <line x1="6" y1="32" x2="-9" y2="26"/>
      <line x1="6" y1="52" x2="-9" y2="48"/>
      <line x1="7" y1="32" x2="21" y2="24"/>
      <line x1="7" y1="52" x2="21" y2="46"/>
    </g>
  </g>

  <!-- gem -->
  <g transform="translate(636 168) scale(0.38)">
    <polygon points="-70,-44 70,-44 110,0 0,120 -110,0" fill="url(#scaGem)"/>
    <polygon points="-70,-44 70,-44 0,8" fill="#5be29a"/>
  </g>
  <!-- sparkles -->
  <path d="M180 150 l6 13 13 6 -13 6 -6 13 -6 -13 -13 -6 13 -6 Z" fill="#f2c879"/>
  <path d="M690 300 l5 11 11 5 -11 5 -5 11 -5 -11 -11 -5 11 -5 Z" fill="#34c77b"/>
</svg>
